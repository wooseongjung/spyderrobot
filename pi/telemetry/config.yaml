# Phase 1 telemetry logger config

rate_hz: 5                       # logger loop rate
output_csv: sample_data/run.csv  # relative to pi/telemetry/

sensors:
  imu:
    enabled: true
    bus: 1
    address: 0x68
  env:
    enabled: true
    pin: 4
  distance:
    enabled: false     # deferred: ECHO needs voltage divider, moved to STM32 (Phase 2)
    trig_pin: 23
    echo_pin: 24
  wetness:
    enabled: false     # deferred: needs an ADC for analog read, moved to STM32 (Phase 2)
    do_pin: 17

display:
  enabled: true        # SSD1306 0.96" OLED on the same I2C bus as the MPU6050
  i2c_address: 0x3C
